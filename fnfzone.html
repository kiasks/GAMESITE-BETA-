<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FNF ZONE | SELECCIÓN</title>
    <style>
        :root {
            --fnf-cyan: #00ffff;
            --fnf-magenta: #ff00ff;
            --bg: #050505;
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Courier New', monospace;
        }

        header {
            padding: 20px; background: #000; border-bottom: 3px solid var(--fnf-magenta);
            text-align: center;
        }

        .mods-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px; padding: 40px;
        }

        /* --- CARTAS CON IMAGEN DE FONDO --- */
        .card {
            height: 320px; /* Un poco más altas para que luzca la imagen */
            background-color: #111;
            background-size: cover;
            background-position: center;
            border: 2px solid #333;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* El texto se queda abajo */
            cursor: pointer;
            transition: 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* Sombreado para que el nombre se lea bien sobre la imagen */
        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(transparent 50%, rgba(0,0,0,0.9));
            z-index: 1;
        }

        .card:hover {
            border-color: var(--fnf-cyan);
            transform: scale(1.05);
            box-shadow: 0 0 25px var(--fnf-cyan);
        }

        .card-info {
            position: relative;
            z-index: 2;
            padding: 15px;
            text-align: center;
        }

        .card-info h3 { margin: 0; font-size: 18px; color: #fff; text-shadow: 2px 2px #000; }
        .card-info p { margin: 5px 0 0; font-size: 11px; color: var(--fnf-cyan); }

        .back {
            display: inline-block; margin-top: 10px; color: #fff; text-decoration: none;
            border: 1px solid #444; padding: 5px 15px;
        }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0;">🎤 FNF <span style="color:var(--fnf-magenta)">DATABASE</span></h1>
    <a href="index.html" class="back">⬅ VOLVER AL GAMESITE</a>
</header>

<div class="mods-grid">

    <!-- MOD CON IMAGEN: Cambia 'tu_imagen.jpg' por la ruta real -->
    <div class="card" style="background-image: url('pagesprites/iridaportada.jpg');" onclick="location.href='iirida/index.html'">
        <div class="card-info">
            <h3>IRIDA MOD</h3>
            <p>OPEN MOD</p>
        </div>
    </div>

    <!-- OTRO MOD -->
    <div class="card" style="background-image: url('pagesprites/aethosportada.png');" onclick="location.href='aethos/index.html'">
        <div class="card-info">
            <h3>VS JEFFY</h3>
            <p>OPEN MOD</p>
        </div>
    </div>

    <!-- Ejemplo sin imagen todavía (fondo negro por defecto) -->
    <div class="card" style="background-image: url('pagesprites/skyportada.jpg');" onclick="location.href='skyreborn/index.html'">
        <div class="card-info">
            <h3>SKY REBORN</h3>
            <p>OPEN MOD</p>
        </div>
    </div>

</div>

</body>
</html>
